<!DOCTYPE html>
<html>
<head>

<title>AI Banking Login</title>

<style>

body{
    background:#f5f7fa;
    font-family:Arial;
}

.container{

    width:350px;
    margin:120px auto;
    padding:30px;
    background:white;
    border-radius:10px;
    box-shadow:0 0 15px gray;

}

input{

    width:100%;
    padding:12px;
    margin-top:10px;
}

button{

    width:100%;
    padding:12px;
    margin-top:15px;
    background:#0B5ED7;
    color:white;
    border:none;
    cursor:pointer;
}

h2{

text-align:center;

}

</style>

</head>

<body>

<div class="container">

<h2>Customer Login</h2>

<form action="/login" method="post">

<input
type="text"
name="username"
placeholder="Username"
required>

<input
type="password"
name="password"
placeholder="Password"
required>

<button type="submit">

Login

</button>

</form>

</div>

</body>

</html>
